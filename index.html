<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYOBA MTN REWARDS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --yellow: #FFEA00;
            --dark: #0a0a0a;
            --darker: #1a1a1a;
            --text: #ffffff;
            --text-light: #b0b0b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 5s infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 600px;
            padding: 2rem;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            margin-bottom: 2rem;
            animation: scaleIn 0.8s ease-out 0.2s backwards;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto;
            background: linear-gradient(135deg, #FFEA00 0%, #FFC000 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #000;
            box-shadow: 0 0 40px rgba(255, 234, 0, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 40px rgba(255, 234, 0, 0.6); }
            50% { box-shadow: 0 0 60px rgba(255, 234, 0, 0.9); }
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #FFEA00, #FFC000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            animation: fadeInUp 0.8s ease-out 0.3s backwards;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-light);
            margin-bottom: 3rem;
            animation: fadeInUp 0.8s ease-out 0.4s backwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-signin {
            padding: 1rem 3rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: #000;
            background: linear-gradient(135deg, #FFEA00, #FFC000);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 234, 0, 0.3);
            animation: fadeInUp 0.8s ease-out 0.5s backwards;
        }

        .btn-signin:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 234, 0, 0.5);
        }

        .btn-signin:active {
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .subtitle { font-size: 1rem; }
            .logo { width: 80px; height: 80px; }
            .btn-signin { padding: 0.8rem 2rem; }
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="container">
        <div class="logo-wrapper">
            <div class="logo">MTN</div>
        </div>

        <h1>AYOBA MTN REWARDS</h1>
        <p class="subtitle">Unlock Premium Benefits & Exclusive Rewards</p>

        <button class="btn-signin" onclick="window.location.href='signup.html'">
            SIGN IN
        </button>
    </div>

    <script src="app.js"></script>
</body>
</html>
